<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKO WORLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #D4AF37; 
            --bg: #0d0d0d; 
            --card: #1a1a1a; 
        }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Header */
        .header { display: flex; justify-content: space-around; padding: 15px; }
        .header-item { 
            background: var(--card); border: 1px solid var(--gold); 
            border-radius: 12px; padding: 10px; flex: 1; 
            text-align: center; margin: 0 5px; color: var(--gold); font-weight: bold;
        }

        /* Ad Banner */
        .ad-banner { 
            background: rgba(212, 175, 55, 0.1); border: 1px dashed var(--gold); 
            margin: 0 20px 15px; padding: 12px; border-radius: 15px; 
            text-align: center; font-size: 14px; cursor: pointer;
        }

        /* Game Area */
        .game-area { 
            flex: 1; background: #000; margin: 0 20px; 
            border-radius: 25px; border: 1px solid #333; 
            display: flex; flex-direction: column; align-items: center; 
            justify-content: center; position: relative;
        }
        .score-title { font-size: 42px; font-weight: bold; color: var(--gold); margin-bottom: 15px; }
        .rabbit-main { width: 180px; cursor: pointer; transition: 0.1s; filter: drop-shadow(0 0 15px var(--gold)); }
        .rabbit-main:active { transform: scale(0.9); }

        /* Navigation Bar */
        .nav-bar { display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 1px solid #222; }
        .nav-btn { text-align: center; color: #666; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .nav-btn i { display: block; font-size: 22px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-item">الجزر: <span id="carrots">0</span> 🥕</div>
        <div class="header-item">الترتيب: #120 🏆</div>
    </div>

    <div class="ad-banner">
        📺 شاهد إعلان واربح 50 جزرة!
    </div>

    <div class="game-area">
        <div class="score-title"><span id="tiko-val">0</span> TIKO</div>
        <img src="https://i.ibb.co/3ykYmXn/rabbit-head.png" class="rabbit-main" id="tap-rabbit" alt="Rabbit">
    </div>

    <div class="nav-bar">
        <div class="nav-btn active"><i>🎮</i>النقر</div>
        <div class="nav-btn"><i>🔄</i>تبادل</div>
        <div class="nav-btn"><i>⚔️</i>مسابقات</div>
        <div class="nav-btn"><i>📢</i>إعلانات</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('t_xp')) || 0;
        function updateUI() {
            document.getElementById('tiko-val').innerText = score.toLocaleString();
            document.getElementById('carrots').innerText = Math.floor(score / 5);
        }
        document.getElementById('tap-rabbit').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            updateUI();
            localStorage.setItem('t_xp', score);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        });
        updateUI();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
