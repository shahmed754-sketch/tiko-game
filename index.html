<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKO WORLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { 
            --gold: #D4AF37; 
            --bg: #0d0d0d; 
            --card: #1a1a1a; 
        }
        body { 
            background-color: var(--bg); 
            color: white; 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }

        /* Header - الترتيب والجزر */
        .header { 
            display: flex; 
            justify-content: space-around; 
            padding: 15px; 
        }
        .header-item { 
            background: var(--card); 
            border: 1px solid var(--gold); 
            border-radius: 12px; 
            padding: 10px; 
            flex: 1; 
            text-align: center; 
            margin: 0 5px; 
            color: var(--gold);
            font-weight: bold;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        /* Ad Banner - بنر الإعلانات */
        .ad-banner { 
            background: rgba(212, 175, 55, 0.1); 
            border: 1px dashed var(--gold); 
            margin: 0 20px 15px; 
            padding: 12px; 
            border-radius: 15px; 
            text-align: center; 
            font-size: 14px;
            cursor: pointer;
        }

        /* Game Area - منطقة اللعب */
        .game-area { 
            flex: 1; 
            background: linear-gradient(180deg, #151515 0%, #000 100%); 
            margin: 0 20px; 
            border-radius: 25px; 
            border: 1px solid #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            position: relative;
        }
        .tiko-counter { 
            font-size: 42px; 
            font-weight: 900; 
            color: var(--gold); 
            margin-bottom: 10px;
            text-shadow: 0 0 15px rgba(212, 175, 55, 0.5);
        }
        .rabbit-btn { 
            width: 200px; 
            filter: drop-shadow(0 0 20px rgba(212, 175, 55, 0.3)); 
            transition: transform 0.1s; 
            cursor: pointer;
        }
        .rabbit-btn:active { transform: scale(0.9); }

        /* Navigation Bar - القائمة السفلية */
        .nav-bar { 
            display: flex; 
            justify-content: space-around; 
            background: #000; 
            padding: 15px 0; 
            border-top: 1px solid #222; 
        }
        .nav-link { 
            text-align: center; 
            color: #777; 
            font-size: 12px; 
            text-decoration: none;
            flex: 1;
        }
        .nav-link.active { color: var(--gold); }
        .nav-link i { display: block; font-size: 22px; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div class="header">
        <div class="header-item">الجزر: <span id="carrotCount">0</span> 🥕</div>
        <div class="header-item">الترتيب: #120 🏆</div>
    </div>

    <div class="ad-banner">
        📺 شاهد إعلان واربح 50 جزرة!
    </div>

    <div class="game-area">
        <div class="tiko-counter"><span id="tikoScore">0</span> TIKO</div>
        <img src="https://i.ibb.co/3ykYmXn/rabbit-head.png" class="rabbit-btn" id="mainRabbit" alt="Rabbit">
    </div>

    <div class="nav-bar">
        <a href="#" class="nav-link active"><i>🎮</i>النقر</a>
        <a href="#" class="nav-link"><i>⚔️</i>مسابقات</a>
        <a href="#" class="nav-link"><i>🔄</i>تبادل</a>
        <a href="#" class="nav-link"><i>📢</i>إعلانات</a>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('tiko_points')) || 0;
        const scoreDisplay = document.getElementById('tikoScore');
        const carrotDisplay = document.getElementById('carrotCount');

        function updateDisplay() {
            scoreDisplay.innerText = score.toLocaleString();
            carrotDisplay.innerText = Math.floor(score / 10);
        }

        document.getElementById('mainRabbit').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score += 1;
            updateDisplay();
            localStorage.setItem('tiko_points', score);
            
            if (window.Telegram.WebApp.HapticFeedback) {
                window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
            }
        });

        updateDisplay();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
