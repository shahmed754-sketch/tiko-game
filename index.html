<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKO WORLD | تيكو وورلد</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #0d0d0d; --card: #1a1a1a; }
        body { background-color: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; user-select: none; }
        .header { display: flex; justify-content: space-around; padding: 15px; background: #111; border-bottom: 1px solid #333; }
        .header-item { background: var(--card); border: 1px solid var(--gold); border-radius: 12px; padding: 10px; flex: 1; text-align: center; margin: 0 5px; color: var(--gold); font-weight: bold; }
        .content { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        #game-view { display: flex; flex-direction: column; align-items: center; width: 100%; }
        .score-title { font-size: 60px; font-weight: bold; color: var(--gold); text-shadow: 0 0 20px rgba(212, 175, 55, 0.5); margin: 10px 0; }
        .rabbit-main { width: 200px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 15px var(--gold)); }
        .rabbit-main:active { transform: scale(0.92); }
        #tasks-view { display: none; width: 100%; padding: 20px; box-sizing: border-box; overflow-y: auto; }
        .task-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-right: 5px solid var(--gold); display: flex; justify-content: space-between; align-items: center; }
        .task-btn { background: var(--gold); color: black; border: none; border-radius: 8px; padding: 8px 15px; font-weight: bold; cursor: pointer; }
        .nav-bar { display: flex; justify-content: space-around; background: #000; padding: 15px 0; border-top: 2px solid var(--gold); }
        .nav-btn { text-align: center; color: #666; font-size: 12px; flex: 1; cursor: pointer; }
        .nav-btn.active { color: var(--gold); }
        .tap-anim { position: absolute; color: var(--gold); font-weight: bold; font-size: 26px; pointer-events: none; animation: fadeUp 0.6s ease-out forwards; }
        @keyframes fadeUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-100px); } }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-item">الترتيب: #120</div>
        <div class="header-item">الجزر: <span id="carrots">0</span> 🥕</div>
    </div>

    <div class="content">
        <div id="game-view">
            <p style="color: #888; margin: 0;">رصيد TIKO الخاص بك</p>
            <h1 class="score-title" id="tiko-val">0</h1>
            <!-- رابط صورة جديد وموثوق -->
            <img src="https://api.dicebear.com/7.x/bottts/svg?seed=Tiko&backgroundColor=ffd700" class="rabbit-main" id="tap-rabbit" alt="Tiko">
        </div>

        <div id="tasks-view">
            <h2 style="color: var(--gold); text-align: center;">المهام اليومية</h2>
            <div class="task-card">
                <div><b>TikTok</b><br><small>+1,000 TIKO</small></div>
                <button class="task-btn" onclick="openTask('https://tiktok.com', 1000)">ابدأ</button>
            </div>
            <div class="task-card">
                <div><b>Telegram</b><br><small>+500 TIKO</small></div>
                <button class="task-btn" onclick="openTask('https://t.me', 500)">انضم</button>
            </div>
        </div>
    </div>

    <div class="nav-bar">
        <div class="nav-btn active" onclick="showTab('game', this)">🏠<br>الرئيسية</div>
        <div class="nav-btn" onclick="showTab('tasks', this)">📋<br>المهام</div>
        <div class="nav-btn">🔄<br>تبادل</div>
        <div class="nav-btn">📢<br>إعلانات</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('tiko_score')) || 0;
        const webapp = window.Telegram.WebApp;
        webapp.expand();

        function updateUI() {
            document.getElementById('tiko-val').innerText = score.toLocaleString();
            document.getElementById('carrots').innerText = Math.floor(score / 10);
            localStorage.setItem('tiko_score', score);
        }

        document.getElementById('tap-rabbit').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++;
            updateUI();
            if(webapp.HapticFeedback) webapp.HapticFeedback.impactOccurred('medium');
            
            const touch = e.touches[0];
            const anim = document.createElement('div');
            anim.className = 'tap-anim';
            anim.innerText = '+1';
            anim.style.left = touch.pageX + 'px';
            anim.style.top = touch.pageY + 'px';
            document.body.appendChild(anim);
            setTimeout(() => anim.remove(), 600);
        });

        function showTab(tab, btn) {
            document.getElementById('game-view').style.display = (tab === 'game') ? 'flex' : 'none';
            document.getElementById('tasks-view').style.display = (tab === 'tasks') ? 'block' : 'none';
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        function openTask(url, reward) {
            window.open(url, '_blank');
            setTimeout(() => { score += reward; updateUI(); alert('تمت إضافة الجائزة!'); }, 2000);
        }

        updateUI();
    </script>
</body>
</html>
