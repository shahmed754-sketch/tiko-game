<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKO RABBIT WORLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --dark-bg: #000000; --card-bg: #111111; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        
        /* الجزء العلوي */
        .header { display: flex; justify-content: space-around; padding: 15px; gap: 10px; }
        .header-item { background: var(--card-bg); border: 1px solid var(--gold); border-radius: 12px; padding: 10px; flex: 1; text-align: center; color: var(--gold); font-weight: bold; }
        
        .ad-banner { background: linear-gradient(45deg, #1a1a1a, #000); border: 1px dashed var(--gold); margin: 0 15px; padding: 12px; border-radius: 15px; text-align: center; font-size: 13px; cursor: pointer; }

        /* منطقة اللعب */
        .page { flex: 1; display: none; flex-direction: column; align-items: center; justify-content: center; overflow-y: auto; padding: 20px; }
        .active-page { display: flex; }
        
        .score-display { font-size: 45px; font-weight: bold; color: var(--gold); margin-bottom: 20px; text-shadow: 0 0 10px rgba(212,175,55,0.5); }
        .rabbit-main { font-size: 150px; cursor: pointer; transition: transform 0.1s; filter: drop-shadow(0 0 20px var(--gold)); }
        .rabbit-main:active { transform: scale(0.9); }

        /* واجهة المحافظ والدفع */
        .wallet-list { width: 100%; max-width: 400px; }
        .wallet-card { background: var(--card-bg); border-right: 4px solid var(--gold); border-radius: 10px; padding: 15px; margin-bottom: 12px; position: relative; }
        .wallet-label { color: var(--gold); font-size: 12px; font-weight: bold; margin-bottom: 5px; display: block; }
        .wallet-value { font-size: 14px; color: #eee; word-break: break-all; font-family: monospace; }
        .copy-btn { background: none; border: 1px solid var(--gold); color: var(--gold); padding: 5px 10px; border-radius: 5px; font-size: 12px; margin-top: 10px; cursor: pointer; width: 100%; transition: 0.3s; }
        .copy-btn:hover { background: var(--gold); color: black; }

        /* القائمة السفلية */
        .nav-bar { background: #080808; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #666; font-size: 11px; text-align: center; cursor: pointer; transition: 0.3s; }
        .nav-item.active { color: var(--gold); font-weight: bold; }
        .nav-icon { font-size: 22px; margin-bottom: 3px; display: block; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-item">الجزر: <span id="carrots">0</span> 🥕</div>
        <div class="header-item">الترتيب: #1 🏆</div>
    </div>

    <div class="ad-banner">📺 شاهد إعلان واربح 50 جزرة!</div>

    <!-- صفحة اللعبة -->
    <div id="game-page" class="page active-page">
        <div class="score-display"><span id="score">0</span> TIKO</div>
        <div class="rabbit-main" id="tapBtn">🐰</div>
    </div>

    <!-- صفحة الدفع والمحافظ -->
    <div id="pay-page" class="page">
        <h2 style="color: var(--gold); margin-bottom: 20px;">عناوين الدفع والمحافظ</h2>
        <div class="wallet-list">
            
            <div class="wallet-card">
                <span class="wallet-label">فودافون كاش (Vodafone Cash)</span>
                <div class="wallet-value" id="voda">01070237568</div>
                <button class="copy-btn" onclick="copyText('voda')">نسخ الرقم</button>
            </div>

            <div class="wallet-card">
                <span class="wallet-label">انستا باي (InstaPay)</span>
                <div class="wallet-value" id="insta">01145433910</div>
                <button class="copy-btn" onclick="copyText('insta')">نسخ الرقم</button>
            </div>

            <div class="wallet-card">
                <span class="wallet-label">عنوان فانتوم (Phantom - SOL)</span>
                <div class="wallet-value" id="phantom">FHS8mMcb1UTZwUnQn5tzQyoMTkbCW9LYj3V38WsM6SAp</div>
                <button class="copy-btn" onclick="copyText('phantom')">نسخ العنوان</button>
            </div>

            <div class="wallet-card">
                <span class="wallet-label">معرف بينانس (Binance ID)</span>
                <div class="wallet-value" id="binance">822008064</div>
                <button class="copy-btn" onclick="copyText('binance')">نسخ الـ ID</button>
            </div>

        </div>
    </div>

    <!-- القائمة السفلية -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="navigate('game', this)">
            <span class="nav-icon">🎮</span>النقر
        </div>
        <div class="nav-item" onclick="navigate('pay', this)">
            <span class="nav-icon">💳</span>الدفع
        </div>
        <div class="nav-item">
            <span class="nav-icon">🔄</span>تبادل
        </div>
        <div class="nav-item">
            <span class="nav-icon">⚔️</span>مسابقات
        </div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('tiko_score')) || 0;
        let carrots = parseInt(localStorage.getItem('tiko_carrots')) || 0;

        function updateUI() {
            document.getElementById('score').innerText = score.toLocaleString();
            document.getElementById('carrots').innerText = carrots.toLocaleString();
        }

        document.getElementById('tapBtn').addEventListener('click', () => {
            score++; carrots++;
            updateUI();
            localStorage.setItem('tiko_score', score);
            localStorage.setItem('tiko_carrots', carrots);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        });

        function navigate(pageId, element) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active-page'));
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            
            document.getElementById(pageId + '-page').classList.add('active-page');
            element.classList.add('active');
        }

        function copyText(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert("تم نسخ البيانات: " + text);
            });
        }

        updateUI();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
