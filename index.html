<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TIKO WORLD</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Tajawal:wght@400;700;800&display=swap" rel="stylesheet">

<!-- Telegram -->
<script src="https://telegram.org/js/telegram-web-app.js"></script>

<!-- GSAP -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

<style>

:root{
--gold:#FFD66B;
--dark:#050505;
--glass:rgba(255,255,255,.06);
--border:rgba(255,215,100,.25);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

body{

height:100vh;
overflow:hidden;

font-family:'Tajawal',sans-serif;

background:
radial-gradient(circle at top,#3b2500 0%,#050505 45%);

color:white;
}

/* BACKGROUND GLOW */

.bg1,.bg2{

position:fixed;

width:400px;
height:400px;

border-radius:50%;

filter:blur(120px);

z-index:-1;
}

.bg1{
background:rgba(255,200,50,.15);
top:-100px;
left:-100px;
}

.bg2{
background:rgba(255,200,50,.08);
bottom:-100px;
right:-100px;
}

/* SPLASH */

#splash{

position:fixed;
inset:0;

background:#000;

display:flex;
align-items:center;
justify-content:center;
flex-direction:column;

z-index:9999;

transition:1s;
}

#splashRabbit{

width:180px;

animation:float 2s infinite ease-in-out;
filter:drop-shadow(0 0 25px gold);
}

#splash h1{

font-size:55px;
font-family:'Orbitron',sans-serif;

color:var(--gold);

margin-top:20px;

text-shadow:
0 0 20px gold;
}

/* APP */

.app{

height:100vh;

padding:14px;

display:flex;
flex-direction:column;
}

/* HEADER */

.top{

display:flex;
gap:12px;
}

.card{

flex:1;

padding:16px;

border-radius:24px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.10),
rgba(255,255,255,.03)
);

backdrop-filter:blur(20px);

border:1px solid var(--border);

box-shadow:
0 8px 32px rgba(0,0,0,.4),
inset 0 0 1px rgba(255,255,255,.2);

text-align:center;
}

.card-title{
font-size:14px;
opacity:.7;
margin-bottom:8px;
}

.card-value{

font-size:24px;

font-weight:800;

color:var(--gold);

font-family:'Orbitron',sans-serif;
}

/* PROFILE */

.profile{

margin-top:12px;

padding:12px;

border-radius:24px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.10),
rgba(255,255,255,.03)
);

backdrop-filter:blur(20px);

border:1px solid var(--border);

display:flex;
align-items:center;
gap:12px;
}

.avatar{

width:58px;
height:58px;

border-radius:50%;

overflow:hidden;

border:2px solid gold;

background:black;
}

.avatar img{

width:100%;
height:100%;
object-fit:cover;
}

.user-info{
flex:1;
}

.username{
font-weight:800;
font-size:20px;
}

.userid{
opacity:.6;
font-size:13px;
}

/* DAILY */

.daily{

margin-top:14px;

padding:18px;

border-radius:22px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

border:1px dashed rgba(255,215,100,.5);

text-align:center;

font-size:18px;

cursor:pointer;

backdrop-filter:blur(15px);
}

/* GAME */

.game{

flex:1;

margin-top:16px;

border-radius:34px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.02)
);

border:1px solid rgba(255,215,100,.25);

backdrop-filter:blur(20px);

position:relative;

overflow:hidden;

display:flex;
flex-direction:column;
align-items:center;
justify-content:center;

box-shadow:
0 0 60px rgba(255,200,50,.08);
}

/* LIGHTS */

.light{

position:absolute;

width:240px;
height:240px;

border-radius:50%;

filter:blur(80px);

opacity:.4;
}

.light1{
background:gold;
top:-60px;
left:-60px;
}

.light2{
background:orange;
bottom:-60px;
right:-60px;
}

/* FLOATING */

.coin{

position:absolute;

font-size:28px;

opacity:.5;

animation:float 5s infinite ease-in-out;
}

.c1{top:15%;left:10%;}
.c2{top:22%;right:14%;}
.c3{bottom:18%;left:16%;}
.c4{bottom:14%;right:12%;}

/* SCORE */

.score{

font-size:65px;

font-family:'Orbitron',sans-serif;

font-weight:900;

color:var(--gold);

text-shadow:
0 0 20px rgba(255,215,100,.8);

margin-bottom:10px;
}

/* LEVEL */

.level{
font-size:20px;
margin-bottom:20px;
opacity:.9;
}

/* XP BAR */

.bar{

width:80%;
height:16px;

background:#1a1a1a;

border-radius:20px;

overflow:hidden;

margin-bottom:30px;
}

.fill{

height:100%;

width:0%;

background:
linear-gradient(
90deg,
#ffcf5a,
#ffe9a6
);

box-shadow:
0 0 20px gold;

transition:.3s;
}

/* RABBIT */

.rabbit-wrap{

position:relative;
}

.rabbit{

width:230px;

cursor:pointer;

user-select:none;

filter:
drop-shadow(0 0 40px rgba(255,215,100,.7));

transition:.1s;

animation:rabbitFloat 3s infinite ease-in-out;
}

.rabbit:active{
transform:scale(.92);
}

/* ENERGY */

.energy{

margin-top:20px;

font-size:20px;

opacity:.9;
}

/* FLOAT TEXT */

.floatText{

position:absolute;

color:gold;

font-size:28px;

font-weight:bold;

pointer-events:none;

animation:up 1s forwards;
}

/* NAV */

.navbar{

margin-top:14px;

padding:14px 0;

border-radius:26px;

background:
linear-gradient(
145deg,
rgba(255,255,255,.08),
rgba(255,255,255,.03)
);

backdrop-filter:blur(20px);

border:1px solid rgba(255,215,100,.2);

display:flex;
justify-content:space-around;
}

.nav-item{

text-align:center;

color:#999;

font-size:13px;
}

.nav-item.active{
color:var(--gold);
}

.nav-icon{

font-size:28px;

margin-bottom:5px;

display:block;
}

/* ANIMATIONS */

@keyframes rabbitFloat{
0%{transform:translateY(0)}
50%{transform:translateY(-12px)}
100%{transform:translateY(0)}
}

@keyframes float{
0%{transform:translateY(0)}
50%{transform:translateY(-15px)}
100%{transform:translateY(0)}
}

@keyframes up{
from{
opacity:1;
transform:translateY(0);
}
to{
opacity:0;
transform:translateY(-80px);
}
}

</style>

</head>

<body>

<div class="bg1"></div>
<div class="bg2"></div>

<!-- SPLASH -->

<div id="splash">

<img
id="splashRabbit"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
/>

<h1>TIKO WORLD</h1>

</div>

<!-- APP -->

<div class="app">

<!-- HEADER -->

<div class="top">

<div class="card">

<div class="card-title">
🥕 الجزر
</div>

<div class="card-value" id="carrots">
0
</div>

</div>

<div class="card">

<div class="card-title">
🏆 المستوى
</div>

<div class="card-value" id="level">
1
</div>

</div>

</div>

<!-- PROFILE -->

<div class="profile">

<div class="avatar">

<img src="https://i.pravatar.cc/150?img=12">

</div>

<div class="user-info">

<div class="username" id="username">
Player
</div>

<div class="userid" id="userid">
ID: 0000
</div>

</div>

</div>

<!-- DAILY -->

<div class="daily" id="dailyBtn">
🎁 احصل على مكافأة يومية
</div>

<!-- GAME -->

<div class="game">

<div class="light light1"></div>
<div class="light light2"></div>

<div class="coin c1">🥕</div>
<div class="coin c2">🥕</div>
<div class="coin c3">🥕</div>
<div class="coin c4">🥕</div>

<div class="score">
<span id="score">0</span> TIKO
</div>

<div class="level">
LEVEL <span id="levelText">1</span>
</div>

<div class="bar">
<div class="fill" id="xpFill"></div>
</div>

<div class="rabbit-wrap">

<img
id="rabbit"
class="rabbit"
src="https://cdn-icons-png.flaticon.com/512/616/616408.png"
/>

</div>

<div class="energy">
⚡ <span id="energy">500</span>/500
</div>

</div>

<!-- NAV -->

<div class="navbar">

<div class="nav-item active">
<span class="nav-icon">🎮</span>
اللعبة
</div>

<div class="nav-item">
<span class="nav-icon">🛒</span>
المتجر
</div>

<div class="nav-item">
<span class="nav-icon">👥</span>
الأصدقاء
</div>

<div class="nav-item">
<span class="nav-icon">🏆</span>
الترتيب
</div>

</div>

</div>

<script>

/* TELEGRAM */

const tg = window.Telegram.WebApp;

tg.expand();

if(tg.requestFullscreen){
tg.requestFullscreen();
}

/* SPLASH */

setTimeout(()=>{

document.getElementById("splash").style.opacity="0";

setTimeout(()=>{
document.getElementById("splash").remove();
},1000);

},2500);

/* USER */

let user = tg.initDataUnsafe?.user;

if(user){

document.getElementById("username").innerText =
user.first_name;

document.getElementById("userid").innerText =
"ID: " + user.id;

}

/* DATA */

let score =
parseInt(localStorage.getItem("score")) || 0;

let carrots =
parseInt(localStorage.getItem("carrots")) || 0;

let level =
parseInt(localStorage.getItem("level")) || 1;

let energy =
parseInt(localStorage.getItem("energy")) || 500;

const maxEnergy = 500;

/* ELEMENTS */

const rabbit =
document.getElementById("rabbit");

const scoreEl =
document.getElementById("score");

const carrotsEl =
document.getElementById("carrots");

const levelEl =
document.getElementById("level");

const levelText =
document.getElementById("levelText");

const energyEl =
document.getElementById("energy");

const xpFill =
document.getElementById("xpFill");

/* UPDATE */

function updateUI(){

scoreEl.innerText =
score.toLocaleString();

carrotsEl.innerText =
carrots.toLocaleString();

levelEl.innerText =
level;

levelText.innerText =
level;

energyEl.innerText =
energy;

let xp =
score % 1000;

xpFill.style.width =
(xp / 1000) * 100 + "%";

localStorage.setItem("score",score);
localStorage.setItem("carrots",carrots);
localStorage.setItem("level",level);
localStorage.setItem("energy",energy);

}

/* TAP */

rabbit.addEventListener("click",(e)=>{

if(energy <= 0) return;

score++;
carrots++;
energy--;

level =
Math.floor(score/1000)+1;

updateUI();

createFloat("+1",e);

/* HAPTIC */

if(tg.HapticFeedback){
tg.HapticFeedback.impactOccurred("medium");
}

/* SCALE */

gsap.fromTo(
rabbit,
{scale:1},
{
scale:.92,
duration:.08,
yoyo:true,
repeat:1
}
);

});

/* FLOAT TEXT */

function createFloat(text,e){

const div =
document.createElement("div");

div.className =
"floatText";

div.innerText =
text;

div.style.left =
e.pageX + "px";

div.style.top =
e.pageY + "px";

document.body.appendChild(div);

setTimeout(()=>{
div.remove();
},1000);

}

/* ENERGY */

setInterval(()=>{

if(energy < maxEnergy){

energy++;

updateUI();

}

},1500);

/* DAILY */

document.getElementById("dailyBtn").onclick=()=>{

const last =
localStorage.getItem("daily");

const now =
Date.now();

if(last && now-last < 86400000){

alert("🎁 تمت المطالبة بالفعل");

return;

}

score += 500;
carrots += 500;

localStorage.setItem("daily",now);

updateUI();

alert("🔥 +500 TIKO");

};

/* INIT */

updateUI();

</script>

</body>
</html>
