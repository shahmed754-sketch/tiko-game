<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TIKO WORLD</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --gold: #D4AF37; --bg: #000; --card: #151515; }
        body { background: var(--bg); color: white; font-family: sans-serif; margin: 0; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }

        /* Header */
        .header { display: flex; justify-content: space-around; padding: 15px 10px; }
        .header-box { background: var(--card); border: 1px solid var(--gold); border-radius: 10px; padding: 8px 12px; font-size: 13px; color: var(--gold); flex: 1; text-align: center; margin: 0 5px; }

        /* Ad Banner */
        .ad-banner { background: linear-gradient(to right, #222, #111); border: 1px dashed var(--gold); margin: 0 15px 15px; padding: 12px; border-radius: 12px; text-align: center; font-size: 13px; cursor: pointer; }

        /* Game Area */
        .game-area { flex: 1; background: var(--card); margin: 0 15px; border-radius: 20px; border: 1px solid #333; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .tiko-score { font-size: 38px; font-weight: bold; color: var(--gold); margin-bottom: 20px; }
        .rabbit-main { width: 180px; filter: drop-shadow(0 0 20px var(--gold)); cursor: pointer; transition: 0.1s; }
        .rabbit-main:active { transform: scale(0.92); }

        /* Wallet/Pay Page (إضافتك الخاصة) */
        #pay-section { display: none; width: 100%; height: 100%; overflow-y: auto; padding: 20px; box-sizing: border-box; }
        .pay-card { background: #222; border-radius: 12px; padding: 15px; margin-bottom: 10px; border-right: 4px solid var(--gold); }
        .pay-title { font-size: 12px; color: var(--gold); margin-bottom: 5px; }
        .pay-val { font-size: 14px; word-break: break-all; font-family: monospace; }

        /* Nav-bar */
        .nav-bar { display: flex; justify-content: space-around; background: #080808; padding: 12px 0; border-top: 1px solid #222; }
        .nav-item { color: #666; font-size: 11px; text-align: center; cursor: pointer; flex: 1; text-decoration: none; }
        .nav-item.active { color: var(--gold); }
        .nav-item i { display: block; font-size: 20px; margin-bottom: 4px; }
    </style>
</head>
<body>

    <!-- Header -->
    <div class="header">
        <div class="header-box">الجزر: <span id="carrots">0</span> 🥕</div>
        <div class="header-box">الترتيب: #120 🏆</div>
    </div>

    <!-- Ad Banner -->
    <div class="ad-banner" onclick="alert('شاهد الإعلان للحصول على المكافأة!')">
        📺 شاهد إعلان واربح 50 جزرة!
    </div>

    <!-- Game Area (الافتراضية) -->
    <div id="game-page" class="game-area">
        <div class="tiko-score"><span id="score">0</span> TIKO</div>
        <img src="https://i.ibb.co/3ykYmXn/rabbit-head.png" class="rabbit-main" id="tapBtn" alt="Rabbit">
    </div>

    <!-- Pay Section (يظهر عند الضغط على تبادل/الدفع) -->
    <div id="pay-section">
        <h3 style="text-align: center; color: var(--gold);">بيانات الدفع والمحافظ</h3>
        <div class="pay-card">
            <div class="pay-title">فودافون كاش</div>
            <div class="pay-val">01070237568</div>
        </div>
        <div class="pay-card">
            <div class="pay-title">إنستا باي</div>
            <div class="pay-val">01145433910</div>
        </div>
        <div class="pay-card">
            <div class="pay-title">عنوان Phantom</div>
            <div class="pay-val">FHS8mMcb1UTZwUnQn5tzQyoMTkbCW9LYj3V38WsM6SAp</div>
        </div>
        <div class="pay-card">
            <div class="pay-title">حساب بينانس</div>
            <div class="pay-val">822008064</div>
        </div>
    </div>

    <!-- Nav-bar -->
    <div class="nav-bar">
        <div class="nav-item active" onclick="showPage('game')"><i>🎮</i>النقر</div>
        <div class="nav-item" onclick="showPage('pay')"><i>🔄</i>تبادل</div>
        <div class="nav-item"><i>⚔️</i>مسابقات</div>
        <div class="nav-item"><i>📢</i>إعلانات</div>
    </div>

    <script>
        let score = parseInt(localStorage.getItem('tiko_s')) || 0;
        let carrots = parseInt(localStorage.getItem('tiko_c')) || 0;

        const scoreEl = document.getElementById('score');
        const carrotsEl = document.getElementById('carrots');

        function update() {
            scoreEl.innerText = score.toLocaleString();
            carrotsEl.innerText = carrots.toLocaleString();
        }

        document.getElementById('tapBtn').addEventListener('touchstart', (e) => {
            e.preventDefault();
            score++; carrots++;
            update();
            localStorage.setItem('tiko_s', score);
            localStorage.setItem('tiko_c', carrots);
            if(window.Telegram.WebApp.HapticFeedback) window.Telegram.WebApp.HapticFeedback.impactOccurred('medium');
        });

        function showPage(p) {
            if(p === 'game') {
                document.getElementById('game-page').style.display = 'flex';
                document.getElementById('pay-section').style.display = 'none';
            } else {
                document.getElementById('game-page').style.display = 'none';
                document.getElementById('pay-section').style.display = 'block';
            }
            // تحديث حالة الأزرار
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');
        }

        update();
        window.Telegram.WebApp.expand();
    </script>
</body>
</html>
